name: Linux mips64

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: "20"

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /usr/lib/llvm-${{ env.LLVM_VERSION }}
          key: llvm-${{ env.LLVM_VERSION }}-apt-jammy

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- ${{ env.LLVM_VERSION }}

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake qemu-user-static
          echo "/usr/lib/llvm-${{ env.LLVM_VERSION }}/bin" >> $GITHUB_PATH

      - name: Build all optimization levels
        run: |
          mkdir -p test-elfs
          for opt in O0 O1 O2 O3 Os Oz Og; do
            echo "=== Building -${opt} ==="
            rm -rf build
            cmake --preset linux-mips64-release -DOPTIMIZATION_LEVEL=${opt}
            cmake --build --preset linux-mips64-release
            cp $(find build -type f -name "output.elf" | head -n 1) test-elfs/output-${opt}.elf
            cp $(find build -type f -name "output.bin" | head -n 1) test-elfs/output-${opt}.bin
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-mips64
          retention-days: 1
          path: test-elfs/

      - name: Test all optimization levels (best-effort)
        # QEMU user-mode for mips64el has incorrect n64 ABI syscall table
        # mappings (e.g. mkdir→creat, mkdirat→newfstatat, socket→wrong).
        # Core/crypto tests pass; filesystem, socket, and network tests fail.
        # README labels mips64 as COMP — this step verifies the ELF is
        # loadable but does not gate the workflow on test exit code.
        run: |
          for elf in test-elfs/output-*.elf; do
            opt=$(basename "$elf" .elf | sed 's/output-//')
            echo "=== Testing ELF -${opt} ==="
            chmod +x "$elf"
            if qemu-mips64el-static "$elf"; then
              echo "=== ELF PASSED -${opt} ==="
            else
              echo "=== ELF partial -${opt} (QEMU mips64 syscall table bug) ==="
            fi
          done
