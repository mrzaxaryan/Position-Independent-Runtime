name: iOS AArch64

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM and build tools
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          for i in 1 2 3; do
            brew install llvm ninja cmake && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Build all optimization levels
        run: |
          for opt in O0 O1 O2 O3 Os Oz Og; do
            echo "=== Building -${opt} ==="
            rm -rf build
            cmake --preset ios-aarch64-release -DOPTIMIZATION_LEVEL=${opt}
            cmake --build --preset ios-aarch64-release
            mkdir -p "release/${opt}"
            find build/release -type f -not -path "*/cmake/*" -exec cp {} "release/${opt}/" \;
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-ios-aarch64
          retention-days: 1
          path: release/
